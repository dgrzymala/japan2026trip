<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Koncerty KRK - 14 dni</title>
  <style>
    :root {
      --bg: #0a1012;
      --card: #131c20;
      --text: #e8f1ef;
      --muted: #99aaa7;
      --accent: #3ad6c9;
      --line: #25343a;
      --good: #7aeaa0;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #153038 0%, var(--bg) 44%);
      color: var(--text);
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 8px 10px 10px;
    }

    .list {
      display: grid;
      gap: 6px;
    }

    .item {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .row {
      display: grid;
      grid-template-columns: 92px minmax(170px, 1fr) minmax(220px, 1.2fr) auto;
      gap: 6px;
      padding: 7px 8px;
      align-items: start;
    }

    .date {
      font-weight: 600;
      font-size: 0.76rem;
      color: #cde4df;
      line-height: 1.2;
    }

    .main {
      min-width: 0;
    }

    .artist {
      margin: 0;
      font-size: 0.84rem;
      line-height: 1.2;
    }

    .meta {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 0.72rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .club-icon {
      width: 1rem;
      text-align: center;
      font-size: 0.78rem;
      filter: saturate(1.1);
    }

    .genre {
      margin: 1px 0 0;
      color: #7db2aa;
      font-size: 0.68rem;
      line-height: 1.15;
    }

    .side {
      font-size: 0.7rem;
      color: #c7d7d4;
      line-height: 1.25;
    }

    .score {
      margin-top: 5px;
      font-size: 0.69rem;
      color: #8cc1b9;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .price {
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--good);
      white-space: nowrap;
    }

    .buy-link {
      border: 1px solid var(--line);
      background: #182329;
      color: var(--text);
      border-radius: 7px;
      height: 23px;
      min-width: 23px;
      padding: 0 7px;
      font-size: 0.7rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .buy-link:hover {
      border-color: var(--accent);
      background: #1b2c33;
    }

    @media (max-width: 900px) {
      .row {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .date {
        font-size: 0.74rem;
      }

      .actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="list" id="list"></section>
  </div>

  <script>
    const events = [
      {
        club: "Klub RE",
        artist: "Body Maintenance (AU)",
        startsAt: "2026-02-25T20:00:00+01:00",
        price: "40 zł (60 zł w dniu)",
        description: "Australijski post-punk z energią DIY. Dobre dopasowanie do Twoich klimatów (post-punk/alt).",
        sourceUrl: "https://web.goingapp.pl/place/1571/1/klub-re",
        match: 5
      },
      {
        club: "Klub Alchemia",
        artist: "Czajka & Puchacz",
        startsAt: "2026-02-26T19:30:00+01:00",
        price: "50 zł (60 zł w dniu)",
        description: "Avant-pop i free impro. Jeśli lubisz bardziej alternatywne, artystyczne granie, to mocny kandydat.",
        sourceUrl: "https://alchemia.com.pl/program/czajka-puchacz-kaja-draksler-szymon-pimpon-gasiorek/",
        match: 4
      },
      {
        club: "Klub RE",
        artist: "Sneaky Jesus",
        startsAt: "2026-02-27T20:00:00+01:00",
        price: "40 zł (60 zł w dniu)",
        description: "Wrocławski kwartet na styku jazzu i eksperymentu, oparty na kolektywnej improwizacji.",
        sourceUrl: "https://web.goingapp.pl/place/1571/1/klub-re",
        match: 5
      },
      {
        club: "Klub Kwadrat",
        artist: "CHICO&QATOSHI",
        startsAt: "2026-02-27T20:00:00+01:00",
        price: "od 180 zł",
        description: "Koncert klubowy w Kwadracie. Mniej oczywiste dopasowanie do Twojego Last.fm, ale nadal w Twoim zakresie klubów.",
        sourceUrl: "https://klubkwadrat.pl/",
        match: 2
      },
      {
        club: "Klub RE",
        artist: "Kresy + Bujaturla + Torschlusspanik",
        startsAt: "2026-02-28T20:00:00+01:00",
        price: "40 zł",
        description: "Wieczór z post-punkiem i art-rockiem; brzmieniowo blisko części Twojej biblioteki Last.fm.",
        sourceUrl: "https://web.goingapp.pl/place/1571/1/klub-re",
        match: 5
      },
      {
        club: "Klub Kwadrat",
        artist: "Łąki Łan",
        startsAt: "2026-02-28T19:00:00+01:00",
        price: "od 119 zł",
        description: "Energetyczny koncert live z przekrojem utworów, bardziej taneczny i festiwalowy set.",
        sourceUrl: "https://klubkwadrat.pl/laki-lan/",
        match: 3
      },
      {
        club: "Hype Park",
        artist: "Brother Tour: Lion's Law, The Chisel, Ultra Sect",
        startsAt: "2026-02-28T19:00:00+01:00",
        price: "od 99 zł",
        description: "Jedyny polski przystanek trasy Oi!/punk. Surowe, mocne granie i intensywny live.",
        sourceUrl: "https://www.ticketmaster.pl/event/lion-s-law-the-chisel-ultra-sect-bilety/2020119612",
        match: 4
      },
      {
        club: "Klub Kwadrat",
        artist: "BUZZCOCKS - 50th Anniversary",
        startsAt: "2026-03-01T20:00:00+01:00",
        price: "od 139.99 zł",
        description: "Klasyka brytyjskiego punk rocka. Brzmieniowo bardzo spójne z Twoim alt/post-punkowym profilem.",
        sourceUrl: "https://klubkwadrat.pl/buzzcocks-50th-anniversary/",
        match: 5
      },
      {
        club: "Hype Park",
        artist: "Shawn James",
        startsAt: "2026-03-07T19:30:00+01:00",
        price: "119-150 zł",
        description: "Folk/blues/alternative rock z mocnym songwriterskim klimatem i dużą emocjonalnością.",
        sourceUrl: "https://knockoutmusicstore.pl/wydarzenia/shawn-james-2",
        match: 4
      },
      {
        club: "Klub Kwadrat",
        artist: "Louis Villain",
        startsAt: "2026-03-07T19:00:00+01:00",
        price: "od 80 zł",
        description: "Koncert hip-hopowy; niższe dopasowanie do Twoich najczęstszych gatunków, ale w obrębie Twoich klubów.",
        sourceUrl: "https://web.goingapp.pl/evt/2411108/louis-villain-krakow",
        match: 1
      }
    ];

    const clubIcons = {
      "Klub RE": "🎛️",
      "Klub Alchemia": "🧪",
      "Klub Kwadrat": "◼️",
      "Hype Park": "⚡"
    };

    const genreByArtist = {
      "Body Maintenance (AU)": "post-punk",
      "Czajka & Puchacz": "avant-pop / impro",
      "Sneaky Jesus": "jazz / eksperymentalne",
      "CHICO&QATOSHI": "rap",
      "Kresy + Bujaturla + Torschlusspanik": "post-punk / art rock",
      "Łąki Łan": "electro-funk",
      "Brother Tour: Lion's Law, The Chisel, Ultra Sect": "oi! / punk",
      "BUZZCOCKS - 50th Anniversary": "punk rock",
      "Shawn James": "folk-blues / alternative",
      "Louis Villain": "hip-hop"
    };

    const today = new Date();
    const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const end = new Date(start);
    end.setDate(end.getDate() + 14);
    end.setHours(23, 59, 59, 999);

    const formatterDate = new Intl.DateTimeFormat("pl-PL", {
      weekday: "short",
      day: "2-digit",
      month: "2-digit"
    });

    const formatterTime = new Intl.DateTimeFormat("pl-PL", {
      hour: "2-digit",
      minute: "2-digit"
    });

    const visible = events
      .map((event) => ({ ...event, date: new Date(event.startsAt) }))
      .filter((event) => event.date >= start && event.date <= end)
      .sort((a, b) => a.date - b.date);

    const list = document.getElementById("list");

    if (!visible.length) {
      list.innerHTML = '<div class="item"><div class="row"><p class="meta">Brak koncertów w wybranym zakresie dat.</p></div></div>';
    } else {
      list.innerHTML = visible
        .map((event) => {
          const dateLabel = `${formatterDate.format(event.date)} ${formatterTime.format(event.date)}`;
          const score = "●".repeat(event.match) + "○".repeat(5 - event.match);
          const genre = genreByArtist[event.artist] || "alternative";

          return `
            <article class="item">
              <div class="row">
                <div class="date">${dateLabel}</div>
                <div class="main">
                  <h2 class="artist">${event.artist}</h2>
                  <p class="meta"><span class="club-icon" aria-hidden="true">${clubIcons[event.club] || "🎵"}</span><span>${event.club}</span></p>
                  <p class="genre">gatunek: ${genre}</p>
                </div>
                <div class="side">
                  ${event.description}
                  <div class="score">Dopasowanie do Last.fm: ${score}</div>
                </div>
                <div class="actions">
                  <span class="price">${event.price}</span>
                  <a class="buy-link" href="${event.sourceUrl}" target="_blank" rel="noopener">bilety</a>
                </div>
              </div>
            </article>
          `;
        })
        .join("");
    }
  </script>
</body>
</html>
