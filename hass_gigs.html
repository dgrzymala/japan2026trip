<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Koncerty KRK - 14 dni</title>
  <style>
    :root {
      --bg: #0b1018;
      --card: #1b2130;
      --card-2: #171d2a;
      --text: #e8ecf3;
      --muted: #aab2c3;
      --accent: #9a7bff;
      --line: #2a3245;
      --good: #f3c95e;
      --danger: #ff8698;
      --shadow: 0 12px 24px rgba(0, 0, 0, 0.33);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #121a28 0%, var(--bg) 48%);
      color: var(--text);
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 8px 10px 10px;
    }

    .hidden-menu {
      margin: 0 0 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #1b2231 0%, #171e2b 100%);
      box-shadow: var(--shadow);
    }

    .hidden-menu[open] {
      padding-bottom: 7px;
    }

    .hidden-summary {
      list-style: none;
      cursor: pointer;
      padding: 7px 10px;
      font-size: 0.69rem;
      color: var(--muted);
      user-select: none;
    }

    .hidden-summary::-webkit-details-marker {
      display: none;
    }

    .hidden-wrap {
      margin: 0;
      padding: 0 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      font-size: 0.69rem;
      color: var(--muted);
    }

    .hidden-chip {
      border: 1px solid #5f4a54;
      background: #2b1f25;
      color: #f4d8df;
      border-radius: 999px;
      padding: 3px 7px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .unhide-btn {
      border: 1px solid #8f6875;
      background: transparent;
      color: #ffdbe1;
      border-radius: 999px;
      font-size: 0.64rem;
      line-height: 1;
      padding: 2px 6px;
      cursor: pointer;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      background: linear-gradient(180deg, #1f2636 0%, #1a2130 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .row {
      display: grid;
      grid-template-columns: 92px minmax(170px, 1fr) auto;
      gap: 8px;
      padding: 9px 10px;
      align-items: start;
    }

    .date {
      font-weight: 600;
      font-size: 0.76rem;
      color: #d6dcea;
      line-height: 1.2;
    }

    .main {
      min-width: 0;
    }

    .artist-btn {
      width: 100%;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      font-size: 0.84rem;
      line-height: 1.2;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .artist-btn::after {
      content: "▸";
      font-size: 0.7rem;
      color: var(--muted);
      transform: translateY(-1px);
      transition: transform 120ms ease;
    }

    .item.open .artist-btn::after {
      transform: rotate(90deg) translateX(1px);
      color: var(--accent);
    }

    .meta {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 0.72rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .club-icon {
      width: 1rem;
      text-align: center;
      font-size: 0.78rem;
      filter: saturate(1.1);
    }

    .genre {
      margin: 1px 0 0;
      color: #b5a5ef;
      font-size: 0.68rem;
      line-height: 1.15;
    }

    .details {
      display: none;
      border-top: 1px dashed #33405a;
      padding: 7px 10px 8px;
      font-size: 0.7rem;
      color: #d0d7e6;
      line-height: 1.25;
      background: linear-gradient(180deg, #171e2b 0%, #141a25 100%);
    }

    .item.open .details {
      display: block;
    }

    .score {
      margin-top: 4px;
      font-size: 0.68rem;
      color: #bca6ff;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .price {
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--good);
      white-space: nowrap;
    }

    .link-btn,
    .hide-btn {
      border: 1px solid #303a50;
      background: var(--card-2);
      color: var(--text);
      border-radius: 10px;
      height: 24px;
      min-width: 24px;
      padding: 0 8px;
      font-size: 0.68rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      white-space: nowrap;
    }

    .link-btn:hover {
      border-color: #f3c95e;
      color: #ffdf8b;
      background: #2a2530;
    }

    .hide-btn {
      color: var(--danger);
      border-color: #67424c;
      background: #261920;
    }

    .hide-btn:hover {
      border-color: #be6374;
      background: #311d25;
    }

     (max-width: 900px) {
      .row {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .date {
        font-size: 0.74rem;
      }

      .actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <details class="hidden-menu" id="hidden-menu">
      <summary class="hidden-summary" id="hidden-summary">Ukryte zespoły</summary>
      <section class="hidden-wrap" id="hidden-wrap"></section>
    </details>
    <section class="list" id="list"></section>
  </div>

  <script>
    const STORAGE_KEY = "hass_gigs_hidden_artists_v1";

    const events = [
      {
        club: "Klub RE",
        artist: "Body Maintenance (AU)",
        startsAt: "2026-02-25T20:00:00+01:00",
        price: "40 zł (60 zł w dniu)",
        description: "Australijski post-punk z energią DIY. Dobre dopasowanie do Twoich klimatów (post-punk/alt).",
        sourceUrl: "https://web.goingapp.pl/place/1571/1/klub-re",
        match: 5
      },
      {
        club: "Klub Alchemia",
        artist: "Czajka & Puchacz",
        startsAt: "2026-02-26T19:30:00+01:00",
        price: "50 zł (60 zł w dniu)",
        description: "Avant-pop i free impro. Jeśli lubisz bardziej alternatywne, artystyczne granie, to mocny kandydat.",
        sourceUrl: "https://alchemia.com.pl/program/czajka-puchacz-kaja-draksler-szymon-pimpon-gasiorek/",
        match: 4
      },
      {
        club: "Klub RE",
        artist: "Sneaky Jesus",
        startsAt: "2026-02-27T20:00:00+01:00",
        price: "40 zł (60 zł w dniu)",
        description: "Wrocławski kwartet na styku jazzu i eksperymentu, oparty na kolektywnej improwizacji.",
        sourceUrl: "https://web.goingapp.pl/place/1571/1/klub-re",
        match: 5
      },
      {
        club: "Klub Kwadrat",
        artist: "CHICO&QATOSHI",
        startsAt: "2026-02-27T20:00:00+01:00",
        price: "od 180 zł",
        description: "Koncert klubowy w Kwadracie. Mniej oczywiste dopasowanie do Twojego Last.fm, ale nadal w Twoim zakresie klubów.",
        sourceUrl: "https://klubkwadrat.pl/",
        match: 2
      },
      {
        club: "Klub RE",
        artist: "Kresy + Bujaturla + Torschlusspanik",
        startsAt: "2026-02-28T20:00:00+01:00",
        price: "40 zł",
        description: "Wieczór z post-punkiem i art-rockiem; brzmieniowo blisko części Twojej biblioteki Last.fm.",
        sourceUrl: "https://web.goingapp.pl/place/1571/1/klub-re",
        match: 5
      },
      {
        club: "Klub Kwadrat",
        artist: "Łąki Łan",
        startsAt: "2026-02-28T19:00:00+01:00",
        price: "od 119 zł",
        description: "Energetyczny koncert live z przekrojem utworów, bardziej taneczny i festiwalowy set.",
        sourceUrl: "https://klubkwadrat.pl/laki-lan/",
        match: 3
      },
      {
        club: "Hype Park",
        artist: "Brother Tour: Lion's Law, The Chisel, Ultra Sect",
        startsAt: "2026-02-28T19:00:00+01:00",
        price: "od 99 zł",
        description: "Jedyny polski przystanek trasy Oi!/punk. Surowe, mocne granie i intensywny live.",
        sourceUrl: "https://www.ticketmaster.pl/event/lion-s-law-the-chisel-ultra-sect-bilety/2020119612",
        match: 4
      },
      {
        club: "Klub Kwadrat",
        artist: "BUZZCOCKS - 50th Anniversary",
        startsAt: "2026-03-01T20:00:00+01:00",
        price: "od 139.99 zł",
        description: "Klasyka brytyjskiego punk rocka. Brzmieniowo bardzo spójne z Twoim alt/post-punkowym profilem.",
        sourceUrl: "https://klubkwadrat.pl/buzzcocks-50th-anniversary/",
        match: 5
      },
      {
        club: "Hype Park",
        artist: "Shawn James",
        startsAt: "2026-03-07T19:30:00+01:00",
        price: "119-150 zł",
        description: "Folk/blues/alternative rock z mocnym songwriterskim klimatem i dużą emocjonalnością.",
        sourceUrl: "https://knockoutmusicstore.pl/wydarzenia/shawn-james-2",
        match: 4
      },
      {
        club: "Klub Kwadrat",
        artist: "Louis Villain",
        startsAt: "2026-03-07T19:00:00+01:00",
        price: "od 80 zł",
        description: "Koncert hip-hopowy; niższe dopasowanie do Twoich najczęstszych gatunków, ale w obrębie Twoich klubów.",
        sourceUrl: "https://web.goingapp.pl/evt/2411108/louis-villain-krakow",
        match: 1
      }
    ];

    const clubIcons = {
      "Klub RE": "🎛️",
      "Klub Alchemia": "🧪",
      "Klub Kwadrat": "◼️",
      "Hype Park": "⚡"
    };

    const genreByArtist = {
      "Body Maintenance (AU)": "post-punk",
      "Czajka & Puchacz": "avant-pop / impro",
      "Sneaky Jesus": "jazz / eksperymentalne",
      "CHICO&QATOSHI": "rap",
      "Kresy + Bujaturla + Torschlusspanik": "post-punk / art rock",
      "Łąki Łan": "electro-funk",
      "Brother Tour: Lion's Law, The Chisel, Ultra Sect": "oi! / punk",
      "BUZZCOCKS - 50th Anniversary": "punk rock",
      "Shawn James": "folk-blues / alternative",
      "Louis Villain": "hip-hop"
    };

    const hiddenArtists = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));
    const openArtists = new Set();

    function saveHiddenArtists() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(hiddenArtists)));
    }

    function spotifySearchUrl(artist) {
      return `https://open.spotify.com/search/${encodeURIComponent(artist)}`;
    }

    function appleMusicSearchUrl(artist) {
      return `https://music.apple.com/pl/search?term=${encodeURIComponent(artist)}`;
    }

    const today = new Date();
    const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const end = new Date(start);
    end.setDate(end.getDate() + 14);
    end.setHours(23, 59, 59, 999);

    const formatterDate = new Intl.DateTimeFormat("pl-PL", {
      weekday: "short",
      day: "2-digit",
      month: "2-digit"
    });

    const formatterTime = new Intl.DateTimeFormat("pl-PL", {
      hour: "2-digit",
      minute: "2-digit"
    });

    function renderHiddenPanel() {
      const hiddenMenu = document.getElementById("hidden-menu");
      const hiddenSummary = document.getElementById("hidden-summary");
      const hiddenWrap = document.getElementById("hidden-wrap");
      const hidden = Array.from(hiddenArtists).sort((a, b) => a.localeCompare(b, "pl"));

      if (!hidden.length) {
        hiddenMenu.open = false;
        hiddenMenu.style.display = "none";
        hiddenWrap.innerHTML = "";
        return;
      }

      hiddenMenu.style.display = "block";
      hiddenSummary.textContent = "Ukryte zespoły (" + hidden.length + ")";

      hiddenWrap.innerHTML = hidden
        .map((artist) =>
          '<span class="hidden-chip">' + artist + '<button class="unhide-btn" data-artist="' + artist + '">przywróć</button></span>'
        )
        .join("");

      document.querySelectorAll(".unhide-btn").forEach((button) => {
        button.addEventListener("click", () => {
          hiddenArtists.delete(button.dataset.artist);
          saveHiddenArtists();
          render();
        });
      });
    }

    function render() {
      const visible = events
        .map((event) => ({ ...event, date: new Date(event.startsAt) }))
        .filter((event) => event.date >= start && event.date <= end)
        .filter((event) => !hiddenArtists.has(event.artist))
        .sort((a, b) => a.date - b.date);

      const list = document.getElementById("list");

      if (!visible.length) {
        list.innerHTML = '<div class="item"><div class="row"><p class="meta">Brak koncertów w wybranym zakresie dat.</p></div></div>';
        renderHiddenPanel();
        return;
      }

      list.innerHTML = visible
        .map((event, index) => {
          const dateLabel = `${formatterDate.format(event.date)} ${formatterTime.format(event.date)}`;
          const score = "●".repeat(event.match) + "○".repeat(5 - event.match);
          const genre = genreByArtist[event.artist] || "alternative";
          const itemId = `evt-${index}`;
          const isOpen = openArtists.has(event.artist);

          return `
            <article class="item ${isOpen ? "open" : ""}" id="${itemId}">
              <div class="row">
                <div class="date">${dateLabel}</div>
                <div class="main">
                  <button class="artist-btn" data-artist="${event.artist}" aria-expanded="${isOpen ? "true" : "false"}">${event.artist}</button>
                  <p class="meta"><span class="club-icon" aria-hidden="true">${clubIcons[event.club] || "🎵"}</span><span>${event.club}</span></p>
                  <p class="genre">gatunek: ${genre}</p>
                </div>
                <div class="actions">
                  <span class="price">${event.price}</span>
                  <a class="link-btn" href="${spotifySearchUrl(event.artist)}" target="_blank" rel="noopener">Spotify</a>
                  <a class="link-btn" href="${appleMusicSearchUrl(event.artist)}" target="_blank" rel="noopener">Apple</a>
                  <a class="link-btn" href="${event.sourceUrl}" target="_blank" rel="noopener">bilety</a>
                  <button class="hide-btn" data-artist="${event.artist}">ukryj</button>
                </div>
              </div>
              <div class="details">
                ${event.description}
                <div class="score">Dopasowanie do Last.fm: ${score}</div>
              </div>
            </article>
          `;
        })
        .join("");

      document.querySelectorAll(".hide-btn").forEach((button) => {
        button.addEventListener("click", () => {
          hiddenArtists.add(button.dataset.artist);
          openArtists.delete(button.dataset.artist);
          saveHiddenArtists();
          render();
        });
      });

      document.querySelectorAll(".artist-btn").forEach((button) => {
        button.addEventListener("click", () => {
          const artist = button.dataset.artist;
          if (openArtists.has(artist)) {
            openArtists.delete(artist);
          } else {
            openArtists.add(artist);
          }
          render();
        });
      });

      renderHiddenPanel();
    }

    render();
  </script>
</body>
</html>
