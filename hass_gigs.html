<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Koncerty KRK - 14 dni</title>
  <style>
    :root {
      --bg: #0b1018;
      --card: #1b2130;
      --card-2: #171d2a;
      --text: #e8ecf3;
      --muted: #aab2c3;
      --accent: #9a7bff;
      --line: #2a3245;
      --good: #f3c95e;
      --danger: #ff8698;
      --shadow: 0 12px 24px rgba(0, 0, 0, 0.33);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #121a28 0%, var(--bg) 48%);
      color: var(--text);
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 8px 10px 10px;
    }

    .hidden-menu {
      margin: 0 0 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #1b2231 0%, #171e2b 100%);
      box-shadow: var(--shadow);
    }

    .hidden-menu[open] {
      padding-bottom: 7px;
    }

    .hidden-summary {
      list-style: none;
      cursor: pointer;
      padding: 7px 10px;
      font-size: 0.69rem;
      color: var(--muted);
      user-select: none;
    }

    .hidden-summary::-webkit-details-marker {
      display: none;
    }

    .hidden-wrap {
      margin: 0;
      padding: 0 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      font-size: 0.69rem;
      color: var(--muted);
    }

    .hidden-chip {
      border: 1px solid #5f4a54;
      background: #2b1f25;
      color: #f4d8df;
      border-radius: 999px;
      padding: 3px 7px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .unhide-btn {
      border: 1px solid #8f6875;
      background: transparent;
      color: #ffdbe1;
      border-radius: 999px;
      font-size: 0.64rem;
      line-height: 1;
      padding: 2px 6px;
      cursor: pointer;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      background: linear-gradient(180deg, #1f2636 0%, #1a2130 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .row {
      display: grid;
      grid-template-columns: 56px 92px minmax(150px, 1fr) auto;
      gap: 8px;
      padding: 9px 10px;
      align-items: start;
    }

    .thumb-wrap {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #303a50;
      background: #141b29;
    }

    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .date {
      font-weight: 600;
      font-size: 0.76rem;
      color: #d6dcea;
      line-height: 1.2;
    }

    .main {
      min-width: 0;
    }

    .artist-btn {
      width: 100%;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      font-size: 0.84rem;
      line-height: 1.2;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .artist-btn::after {
      content: "▸";
      font-size: 0.7rem;
      color: var(--muted);
      transform: translateY(-1px);
      transition: transform 120ms ease;
    }

    .item.open .artist-btn::after {
      transform: rotate(90deg) translateX(1px);
      color: var(--accent);
    }

    .meta {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 0.72rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .club-icon {
      width: 1rem;
      text-align: center;
      font-size: 0.78rem;
      filter: saturate(1.1);
    }

    .genre {
      margin: 1px 0 0;
      color: #b5a5ef;
      font-size: 0.68rem;
      line-height: 1.15;
    }

    .details {
      display: none;
      border-top: 1px dashed #33405a;
      padding: 7px 10px 8px;
      font-size: 0.7rem;
      color: #d0d7e6;
      line-height: 1.25;
      background: linear-gradient(180deg, #171e2b 0%, #141a25 100%);
    }

    .item.open .details {
      display: block;
    }

    .score {
      margin-top: 4px;
      font-size: 0.68rem;
      color: #bca6ff;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .price {
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--good);
      white-space: nowrap;
    }

    .link-btn,
    .hide-btn {
      border: 1px solid #303a50;
      background: var(--card-2);
      color: var(--text);
      border-radius: 10px;
      height: 24px;
      min-width: 24px;
      padding: 0 8px;
      font-size: 0.68rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      white-space: nowrap;
    }

    .link-btn:hover {
      border-color: #f3c95e;
      color: #ffdf8b;
      background: #2a2530;
    }

    .hide-btn {
      color: var(--danger);
      border-color: #67424c;
      background: #261920;
    }

    .hide-btn:hover {
      border-color: #be6374;
      background: #311d25;
    }

    @media (max-width: 900px) {
      .wrap {
        padding: 6px 6px 8px;
      }

      .row {
        grid-template-columns: 1fr;
        gap: 5px;
        padding: 8px 8px;
      }

      .date {
        font-size: 0.72rem;
      }

      .actions {
        justify-content: flex-start;
        width: 100%;
        gap: 4px;
      }

      .actions .price {
        flex-basis: 100%;
      }

      .link-btn,
      .hide-btn {
        height: 22px;
        min-width: 22px;
        padding: 0 6px;
        font-size: 0.62rem;
      }
    }

    @media (max-width: 420px) {
      .thumb-wrap {
        width: 44px;
        height: 44px;
      }
      .artist-btn {
        font-size: 0.8rem;
      }

      .meta {
        font-size: 0.68rem;
      }

      .genre {
        font-size: 0.64rem;
      }

      .details {
        padding: 6px 8px 7px;
        font-size: 0.67rem;
      }

      .actions {
        gap: 3px;
      }

      .link-btn,
      .hide-btn {
        padding: 0 5px;
        font-size: 0.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <details class="hidden-menu" id="hidden-menu">
      <summary class="hidden-summary" id="hidden-summary">Ukryte zespoły</summary>
      <section class="hidden-wrap" id="hidden-wrap"></section>
    </details>
    <section class="list" id="list"></section>
  </div>

  <script>
    const STORAGE_KEY = "hass_gigs_hidden_artists_v1";
    const HA_HIDDEN_ENTITY_ID = "input_text.hass_gigs_hidden_artists";

    const events = [
      {
        club: "Klub Alchemia",
        artist: "DUMAI DUNAI",
        startsAt: "2026-03-05T20:00:00+01:00",
        price: "70 zł (85 zł w dniu)",
        description: "Kanadyjski zespół łączący ukraiński folklor z elektroniką i psychodelią.",
        sourceUrl: "https://alchemia.com.pl/program/",
        match: 4
      },
      {
        club: "Klub Alchemia",
        artist: "Limboski i Wiśnia",
        startsAt: "2026-03-07T20:00:00+01:00",
        price: "cena: do sprawdzenia",
        description: "Akustyczny, autorski set songwriterowy z alternatywnym charakterem.",
        sourceUrl: "https://alchemia.com.pl/program/",
        match: 4
      },
      {
        club: "Klub Kwadrat",
        artist: "PLK",
        startsAt: "2026-03-13T20:00:00+01:00",
        price: "cena: do sprawdzenia",
        description: "Duży koncert rapowy w Kwadracie, nowa trasa PLK.",
        sourceUrl: "https://www.karabas.com/concerts/plk_krakow/",
        match: 2
      },
      {
        club: "Hype Park",
        artist: "EVELINA ROSS - THIS IS ME Tour",
        startsAt: "2026-03-13T18:00:00+01:00",
        price: "od 96 zł",
        description: "Popowy koncert klubowy w Hype Parku, trasa THIS IS ME.",
        sourceUrl: "https://www.ticketmaster.pl/event/evelina-ross-this-is-me-tour-bilety/2023237061",
        match: 2
      },
      {
        club: "Klub Alchemia",
        artist: "Traszno + Canto Ostinato",
        startsAt: "2026-03-13T19:30:00+01:00",
        price: "cena: do sprawdzenia",
        description: "Wieczór z alternatywą i eksperymentem na scenie Alchemii.",
        sourceUrl: "https://alchemia.com.pl/program/",
        match: 4
      },
      {
        club: "Klub Kwadrat",
        artist: "DZIDZIO",
        startsAt: "2026-03-14T20:00:00+01:00",
        price: "od 240 zł",
        description: "Duży koncert zespołu DZIDZIO w krakowskim Kwadracie.",
        sourceUrl: "https://www.karabas.com/concerts/dzidzio_krakow/",
        match: 2
      },
      {
        club: "Klub Alchemia",
        artist: "Ayoub Houmanna",
        startsAt: "2026-03-14T20:00:00+01:00",
        price: "65 zł (75 zł w dniu)",
        description: "Afro-jazz i world music z marokańskim liderem i międzynarodowym składem.",
        sourceUrl: "https://alchemia.com.pl/program/",
        match: 4
      }
    ];

    const clubIcons = {
      "Klub RE": "🎛️",
      "Klub Alchemia": "🧪",
      "Klub Kwadrat": "◼️",
      "Hype Park": "⚡"
    };

    const genreByArtist = {
      "DUMAI DUNAI": "world / electro-folk / psych",
      "Limboski i Wiśnia": "songwriter / alternative",
      "PLK": "rap",
      "EVELINA ROSS - THIS IS ME Tour": "pop",
      "Traszno + Canto Ostinato": "alternative / eksperymentalne",
      "DZIDZIO": "rock / folk-rock",
      "Ayoub Houmanna": "afro-jazz / world music"
    };

    const hiddenArtists = new Set();
    const openArtists = new Set();

    function encodeHiddenArtists(list) {
      return list.map((name) => encodeURIComponent(name)).join(",");
    }

    function decodeHiddenArtists(raw) {
      if (!raw || raw === "unknown" || raw === "unavailable") return [];
      return raw
        .split(",")
        .map((item) => item.trim())
        .filter(Boolean)
        .map((item) => {
          try {
            return decodeURIComponent(item);
          } catch {
            return item;
          }
        });
    }

    async function loadHiddenArtists() {
      hiddenArtists.clear();

      try {
        const response = await fetch(`/api/states/${HA_HIDDEN_ENTITY_ID}`, {
          method: "GET",
          headers: { "Accept": "application/json" },
          credentials: "same-origin"
        });

        if (response.ok) {
          const payload = await response.json();
          decodeHiddenArtists(payload.state).forEach((artist) => hiddenArtists.add(artist));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(hiddenArtists)));
          return;
        }
      } catch (error) {
        console.warn("Nie udalo sie odczytac ukrytych zespolow z HA, fallback localStorage.", error);
      }

      const local = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      local.forEach((artist) => hiddenArtists.add(artist));
    }

    async function saveHiddenArtists() {
      const list = Array.from(hiddenArtists);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));

      try {
        const value = encodeHiddenArtists(list);
        await fetch("/api/services/input_text/set_value", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            entity_id: HA_HIDDEN_ENTITY_ID,
            value
          })
        });
      } catch (error) {
        console.warn("Nie udalo sie zapisac ukrytych zespolow do HA, zapisano lokalnie.", error);
      }
    }

    function spotifySearchUrl(artist) {
      return `https://open.spotify.com/search/${encodeURIComponent(artist)}`;
    }

    function appleMusicSearchUrl(artist) {
      return `https://music.apple.com/pl/search?term=${encodeURIComponent(artist)}`;
    }

    const artistPhotoCache = new Map();

    function artistThumbFallback() {
      return "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 160 160'><rect width='160' height='160' fill='%23141b29'/><circle cx='80' cy='58' r='24' fill='%23303a50'/><rect x='35' y='92' width='90' height='38' rx='19' fill='%23303a50'/></svg>";
    }

    function primaryArtistName(artist) {
      return artist
        .split(":")[0]
        .split("+")[0]
        .split(",")[0]
        .replace(/\(.*?\)/g, "")
        .trim();
    }

    function wikiTitleCandidates(artist) {
      const base = primaryArtistName(artist);
      return Array.from(new Set([base, `${base} (band)`, `${base} (musician)`].filter(Boolean)));
    }

    async function fetchWikipediaThumb(title) {
      const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`, {
        method: "GET",
        headers: { "Accept": "application/json" }
      });
      if (!response.ok) return null;
      const payload = await response.json();
      return payload?.thumbnail?.source || null;
    }

    async function resolveArtistThumb(artist) {
      if (artistPhotoCache.has(artist)) return artistPhotoCache.get(artist);

      const resolver = (async () => {
        const candidates = wikiTitleCandidates(artist);
        for (const candidate of candidates) {
          try {
            const thumb = await fetchWikipediaThumb(candidate);
            if (thumb) return thumb;
          } catch (error) {
            // try next candidate
          }
        }
        return artistThumbFallback();
      })();

      artistPhotoCache.set(artist, resolver);
      return resolver;
    }

    function hydrateArtistThumbs() {
      document.querySelectorAll(".thumb[data-artist]").forEach((img) => {
        const artist = img.dataset.artist;
        void resolveArtistThumb(artist).then((url) => {
          img.src = url;
        });
      });
    }

    const today = new Date();
    const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const end = new Date(start);
    end.setDate(end.getDate() + 14);
    end.setHours(23, 59, 59, 999);

    const formatterDate = new Intl.DateTimeFormat("pl-PL", {
      weekday: "short",
      day: "2-digit",
      month: "2-digit"
    });

    const formatterTime = new Intl.DateTimeFormat("pl-PL", {
      hour: "2-digit",
      minute: "2-digit"
    });

    function renderHiddenPanel() {
      const hiddenMenu = document.getElementById("hidden-menu");
      const hiddenSummary = document.getElementById("hidden-summary");
      const hiddenWrap = document.getElementById("hidden-wrap");
      const hidden = Array.from(hiddenArtists).sort((a, b) => a.localeCompare(b, "pl"));

      if (!hidden.length) {
        hiddenMenu.open = false;
        hiddenMenu.style.display = "none";
        hiddenWrap.innerHTML = "";
        return;
      }

      hiddenMenu.style.display = "block";
      hiddenSummary.textContent = "Ukryte zespoły (" + hidden.length + ")";

      hiddenWrap.innerHTML = hidden
        .map((artist) =>
          '<span class="hidden-chip">' + artist + '<button class="unhide-btn" data-artist="' + artist + '">przywróć</button></span>'
        )
        .join("");

      document.querySelectorAll(".unhide-btn").forEach((button) => {
        button.addEventListener("click", () => {
          hiddenArtists.delete(button.dataset.artist);
          void saveHiddenArtists();
          render();
        });
      });
    }

    function render() {
      const visible = events
        .map((event) => ({ ...event, date: new Date(event.startsAt) }))
        .filter((event) => event.date >= start && event.date <= end)
        .filter((event) => !hiddenArtists.has(event.artist))
        .sort((a, b) => a.date - b.date);

      const list = document.getElementById("list");

      if (!visible.length) {
        list.innerHTML = '<div class="item"><div class="row"><p class="meta">Brak koncertów w wybranym zakresie dat.</p></div></div>';
        renderHiddenPanel();
        return;
      }

      list.innerHTML = visible
        .map((event, index) => {
          const dateLabel = `${formatterDate.format(event.date)} ${formatterTime.format(event.date)}`;
          const score = "●".repeat(event.match) + "○".repeat(5 - event.match);
          const genre = genreByArtist[event.artist] || "alternative";
          const itemId = `evt-${index}`;
          const isOpen = openArtists.has(event.artist);

          return `
            <article class="item ${isOpen ? "open" : ""}" id="${itemId}">
              <div class="row">
                <div class="thumb-wrap">
                  <img class="thumb" src="${artistThumbFallback()}" data-artist="${event.artist}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.onerror=null;this.src='${artistThumbFallback()}';">
                </div>
                <div class="date">${dateLabel}</div>
                <div class="main">
                  <button class="artist-btn" data-artist="${event.artist}" aria-expanded="${isOpen ? "true" : "false"}">${event.artist}</button>
                  <p class="meta"><span class="club-icon" aria-hidden="true">${clubIcons[event.club] || "🎵"}</span><span>${event.club}</span></p>
                  <p class="genre">gatunek: ${genre}</p>
                </div>
                <div class="actions">
                  <span class="price">${event.price}</span>
                  <a class="link-btn" href="${spotifySearchUrl(event.artist)}" target="_blank" rel="noopener">Spotify</a>
                  <a class="link-btn" href="${appleMusicSearchUrl(event.artist)}" target="_blank" rel="noopener">Apple</a>
                  <a class="link-btn" href="${event.sourceUrl}" target="_blank" rel="noopener">bilety</a>
                  <button class="hide-btn" data-artist="${event.artist}">ukryj</button>
                </div>
              </div>
              <div class="details">
                ${event.description}
                <div class="score">Dopasowanie do Last.fm: ${score}</div>
              </div>
            </article>
          `;
        })
        .join("");

      document.querySelectorAll(".hide-btn").forEach((button) => {
        button.addEventListener("click", () => {
          hiddenArtists.add(button.dataset.artist);
          openArtists.delete(button.dataset.artist);
          void saveHiddenArtists();
          render();
        });
      });

      document.querySelectorAll(".artist-btn").forEach((button) => {
        button.addEventListener("click", () => {
          const artist = button.dataset.artist;
          if (openArtists.has(artist)) {
            openArtists.delete(artist);
          } else {
            openArtists.add(artist);
          }
          render();
        });
      });

      renderHiddenPanel();
      hydrateArtistThumbs();
    }

    async function init() {
      await loadHiddenArtists();
      render();
    }

    void init();
  </script>
</body>
</html>
